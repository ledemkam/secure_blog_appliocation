services:
  postgres:
    image: postgres:16
    container_name: blogapp-postgres
    restart: always
    environment:
      POSTGRES_DB: blogappDB
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    restart: always
    depends_on:
      - postgres
    ports:
      - "8989:8080"

volumes:
  postgres-data:
