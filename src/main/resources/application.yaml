spring:
  application:
    name: blog_app
  profiles:
    default: dev
  config:
    import: optional:file:.env[.properties]
  main:
    allow-bean-definition-overriding: true

  # Configuration de base de données H2
  datasource:
    url: jdbc:h2:mem:blogforumdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

# Configuration JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 heures en millisecondes


# Logging
logging:
  level:
    root: INFO
    com.kte.blog_app: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'


management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
